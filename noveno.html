 <style>
     * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         transition: 1s;
     }


     body {
         min-height: 100vh;
         display: flex;
         justify-content: center;
         align-items: center;
         background: rgb(131,58,180);
background: linear-gradient(100deg, rgba(131,58,180,1) 0%, rgba(29,191,253,1) 50%, rgba(67,240,206,1) 100%);
     }
     .scene {
         width: 16em;
         height: 22em;
         perspective: 30em;
     }
     .card {
         width: 100%;
         height: 100%;
         position: relative;
         transform-style: preserve-3d;
     }
     .face {
         width: 100%;
         height: 100%;
         line-height: 15rem;
         text-align: center;
         position: absolute;
         border-radius: 17px;
         overflow: hidden;
         backface-visibility: hidden;
     }
     .front img{
        width: 16rem;
        height: 22rem;
        object-fit: cover;
     }
     .back {
         transform: rotate(180deg);
         display: flex;
         justify-content: center;
         align-items: center;
     }

     .back img {
         width: 18rem;

     }
     .scene:hover .card {
         transform: rotateY(-180deg);
     }

 </style>

<body>
    <div class="scene">
        <div class="card">
            <div class="face front"><img src="./img/miamor.jpeg" alt=""></div>
            <div class="face back"><img src="./img/miamor2.jpeg" alt=""></div>

            </div>
        </div>
    </div>
</body>
</html>
