<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./img/inconosegundo.png">
    <title>HOLA</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(#4c2882, #ea899a, #b666d2);
        }

    div {
        width: 200px;
        height: 200px;
        box-shadow: 16px 14px 20px #0000008c;
        border-radius: 10px;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    div::before{
        content: "";
        background-image: conic-gradient(
            #7fffd4 20deg,
            transparent 120deg
        );
        width: 150%;
        height: 150%;
        position: absolute;
        animation: rotate 2s linear infinite;
    }
    div::after{
        content: "Que hoy te vaya bien en lo que sea que hagas. (suerte bonita:3, se lava la colita xd, okey no)";
        width: 190px;
        height: 190px;
        background: #101010;
        position: absolute;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #7fffd4;
        font-size: larger;
        letter-spacing: 5px;
        box-shadow: inset 20px 20px 20px #0000008c;
    }
    @keyframes rotate {
        0%{
            transform: rotate(0deg);
        }
        100%{
            transform: rotate(-360deg);
        }
    }

    @media (max-width:800px) {
        .before,
        .after {
            width: 100%;
        }
    }
    @media (max-width:200px) {
        .before,
        .after {
            width: 100%;
        }
    }

</style>

<body>
    <div></div>
</body>

</html>
