<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
    }

    #back-moe {
        position: absolute;
        transform: translate(-50%, -50%);
        pointer-events: none;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: #0f0;
        filter: blur(50px);
        animation: colorhane 3s linear infinite;
    }
    @keyframes colorhane{
        0%, 100%{
            background-color: #0f0;
        }
        20%{
            background-color: #00ffaa;
        }
        40%{
            background-color: #e4ff00;
        }
        60%{
            background-color: #ff00eb;
        }
        80%{
            background-color: #ff0000;
        }

    }
    .row{
        display: inline-flex;
        margin-left: -30px;
        margin-top: -28px;
        pointer-events: none;
    }
    .row:nth-child(even){
        margin-left: -81px;
    }
    .body-rectene {
        position: relative;
        width: 100px;
        height: 100px;
        background-color: #111;
        margin: 2px;
        transition: 2s;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .body-main{
        background-color: #111;;
    }
/* telefono */
    @media (max-width:250px) {
        .body-main { 
            width: 999%;          
        }
    }

</style>
